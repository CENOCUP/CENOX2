<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA LEAGUE - Pontos Corridos & Performance</title>
    <style>
        :root { --bg: #050505; --card: #111; --neon: #00ff87; --text: #fff; --dim: #666; --gold: #ffd700; --blue: #00d4ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1150px; }
        
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--neon); padding-bottom: 15px; }
        
        .nav-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        select { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .table-container { background: var(--card); border-radius: 12px; padding: 15px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.6); margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; color: var(--dim); font-size: 0.65rem; text-transform: uppercase; padding: 12px; border-bottom: 1px solid #222; }
        td { padding: 14px 10px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }
        
        /* Destaques de Coluna */
        .col-pts { color: var(--neon); font-weight: 900; font-size: 1.1rem; }
        .badge-aprov { background: #222; color: var(--blue); padding: 3px 7px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; border: 1px solid var(--blue); }
        .badge-desempenho { color: var(--neon); font-weight: bold; }
        .badge-titulos { color: var(--gold); font-weight: bold; border: 1px solid var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }

        /* Galeria */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; width: 100%; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center; border-top: 3px solid var(--gold); }
        .card-temp { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; }

        /* Admin */
        #adminArea { display: none; background: #1a1a1a; padding: 20px; border-radius: 12px; margin-top: 25px; border: 1px solid #333; width: 100%; box-sizing: border-box; }
        .edit-row { display: grid; grid-template-columns: 2fr repeat(5, 1fr) 40px; gap: 5px; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin:0;">FIFA <span style="color:var(--neon)">PRO LEAGUE</span></h1>
        <p style="color:var(--dim); font-size: 0.7rem; margin-top: 5px;">PONTOS CORRIDOS | APROVEITAMENTO | DESEMPENHO</p>
    </header>

    <div class="nav-box">
        <span>Visualizar:</span>
        <select id="viewSelect" onchange="updateView(this.value)"></select>
    </div>

    <div class="table-container">
        <table id="tabela">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Jogador</th>
                    <th class="geral-only">🏆 Títulos</th>
                    <th class="geral-only">🎮 Partic.</th>
                    <th>P</th>
                    <th>J</th>
                    <th>V/E/D</th>
                    <th>GP/GC</th>
                    <th>SG</th>
                    <th>% Aprov.</th>
                    <th>Desempenho</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <h2 style="color:var(--gold); text-align: center; font-size: 1.2rem; text-transform: uppercase;">✨ Galeria de Campeões ✨</h2>
    <div id="gallery" class="gallery"></div>

    <button onclick="showAdmin()" style="background:none; border:none; color:#111; margin-top:50px; cursor:pointer;">Config</button>

    <div id="adminArea">
        <div id="editList"></div>
        <button onclick="addPlayer()" style="width:100%; padding:10px; margin-top:10px; background:none; border: 1px dashed var(--neon); color:var(--neon); cursor:pointer">+ Adicionar Jogador</button>
        <button onclick="saveData()" style="width:100%; padding:10px; margin-top:10px; background:var(--neon); color:#000; font-weight:bold; cursor:pointer">SALVAR ALTERAÇÕES</button>
        <button onclick="closeSeason()" style="width:100%; padding:10px; margin-top:30px; background:red; color:#fff; cursor:pointer">🔒 ENCERRAR E ARQUIVAR TEMPORADA</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('fifa_full_system_v4')) || { atual: [], historico: [] };
    let viewMode = 'atual';

    function updateView(v) { viewMode = v; render(); }

    function render() {
        const tbody = document.querySelector("#tabela tbody");
        const select = document.getElementById('viewSelect');
        const gallery = document.getElementById('gallery');
        
        // Update Select
        select.innerHTML = `<option value="atual" ${viewMode==='atual'?'selected':''}>Temporada Atual</option><option value="geral" ${viewMode==='geral'?'selected':''}>Ranking Geral</option>`;
        db.historico.forEach((t, i) => select.innerHTML += `<option value="${i}" ${viewMode==i?'selected':''}>${t.nome}</option>`);

        let lista = (viewMode === 'atual') ? [...db.atual] : (viewMode === 'geral' ? processarGeral() : [...db.historico[viewMode].dados]);
        
        // Show/Hide columns
        document.querySelectorAll('.geral-only').forEach(el => el.style.display = (viewMode === 'geral' ? 'table-cell' : 'none'));

        // CRITÉRIO: Pontos > Vitórias > Saldo > Gols Pró
        lista.sort((a,b) => {
            let pA = (a.v*3)+a.e, pB = (b.v*3)+b.e;
            if(viewMode === 'geral') return b.titulos - a.titulos || pB - pA;
            return pB - pA || b.v - a.v || (b.gp-b.gc) - (a.gp-a.gc) || b.gp - a.gp;
        });

        tbody.innerHTML = lista.map((j, i) => {
            let pts = (j.v*3)+j.e;
            let jogos = j.v+j.e+j.d;
            let aprov = jogos > 0 ? ((pts / (jogos * 3)) * 100).toFixed(1) : "0.0";
            let bPos = (i==0?20:(i==1?15:(i==2?10:0)));
            let desempenho = (bPos + (j.gp*2.5) + (j.gc*-2)).toFixed(1);

            return `<tr>
                <td>${i+1}º</td>
                <td style="font-weight:bold">${j.nome} ${i==0?'🏆':''}</td>
                ${viewMode==='geral' ? `<td><span class="badge-titulos">🥇 ${j.titulos}</span></td><td>${j.participacoes}</td>` : ''}
                <td class="col-pts">${pts}</td>
                <td>${jogos}</td>
                <td>${j.v}/${j.e}/${j.d}</td>
                <td>${j.gp}/${j.gc}</td>
                <td style="color:${(j.gp-j.gc)>=0?'#00d4ff':'#ff4444'}">${j.gp-j.gc}</td>
                <td><span class="badge-aprov">${aprov}%</span></td>
                <td><span class="badge-desempenho">${desempenho}</span></td>
            </tr>`;
        }).join('');

        // Gallery
        gallery.innerHTML = db.historico.map(t => {
            let win = [...t.dados].sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc))[0];
            return `<div class="card"><div class="card-temp">${t.nome}</div><div style="font-weight:bold; margin-top:5px;">🥇 ${win ? win.nome : '---'}</div></div>`;
        }).reverse().join('');
    }

    function processarGeral() {
        let res = {};
        [...db.historico, { dados: db.atual }].forEach(temp => {
            let ord = [...temp.dados].sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));
            temp.dados.forEach(j => {
                if(!res[j.nome]) res[j.nome] = {nome:j.nome, v:0, e:0, d:0, gp:0, gc:0, titulos:0, participacoes:0};
                res[j.nome].v += j.v; res[j.nome].e += j.e; res[j.nome].d += j.d;
                res[j.nome].gp += j.gp; res[j.nome].gc += j.gc;
                res[j.nome].participacoes += 1;
                if(ord[0] && j.nome === ord[0].nome && (j.v+j.e+j.d > 0)) res[j.nome].titulos += 1;
            });
        });
        return Object.values(res).map(j => ({...j, pts: (j.v*3)+j.e}));
    }

    function showAdmin() { document.getElementById('adminArea').style.display = 'block'; renderAdmin(); }
    function renderAdmin() {
        document.getElementById('editList').innerHTML = db.atual.map((j,i) => `
